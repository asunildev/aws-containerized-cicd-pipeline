name: Frontend CI

on:
  push:
    branches-ignore:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Test Image
        run: docker build -t react-test -f Dockerfile.dev .

      - name: Run Tests
        run: docker run -e CI=true react-test npm test